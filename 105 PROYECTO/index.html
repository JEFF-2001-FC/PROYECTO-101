<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>CARDPOKEMON</title>
    <link rel="stylesheet" href="css/style.css" />
    <link rel="shorcut icon" href="IMG/fuego.png" type="image/x-icon" />
  </head>
  <body>
    <main class="conteiner">
      <article class="card">
        <img
          src="IMG/fondoencabezado (1).svg"
          alt="fondocard"
          class="card-header"
        />
        <div class="card-body">
          <div class="card-body-contentim">
            <img
              src="/IMG/charizard.png"
              alt=""
              class="card-body-contentimg"
              width="150"
            />
          </div>
          <h1 class="card-body-titlle">Charizad <span>#26</span></h1>
          <p class="card-body-text">coleccionable</p>
        </div>
        <div class="card-footer">
          <div class="card-footer-poder">
            <h3>Poder</h3>
            <img src="/IMG/fuego.png" alt="" width="35" />
          </div>
          <div class="card-footer-poder">
            <h3>Resistencia</h3>
            <img src="/IMG/castillo.png" alt="" width="35" />
          </div>
          <div class="card-footer-poder">
            <h3>Bonus</h3>
            <img src="/IMG/cofre.png" alt="" width="35" />
          </div>
        </div>
      </article>
    </main>
  </body>
</html>
